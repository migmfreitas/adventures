name: Update route index

on:
  push:
    paths:
      - 'data/gpx/**.gpx'
  workflow_dispatch:

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Skip if the website already updated index.json directly
    if: "!startsWith(github.event.head_commit.message, 'Add route:')"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Rebuild index.json
        run: node .github/scripts/build-index.js

      - name: Commit updated index.json
        run: |
          git config user.name  "adventure-log[bot]"
          git config user.email "adventure-log[bot]@users.noreply.github.com"
          git add data/index.json
          git diff --cached --quiet || git commit -m "chore: rebuild index.json"
          git push

