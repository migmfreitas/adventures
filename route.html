<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route — Adventure Log</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c27; --surface2: #1f2435;
      --border: #2a3048; --text: #e2e6f0; --muted: #7a849e; --accent: #e07840;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--surface); border-bottom: 1px solid var(--border);
      height: 56px; display: flex; align-items: center; padding: 0 20px; gap: 16px;
    }
    .back-btn {
      font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted);
      text-decoration: none; display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); transition: all .15s; white-space: nowrap;
    }
    .back-btn:hover { color: var(--text); }
    .header-title { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-type { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-left: auto; white-space: nowrap; flex-shrink: 0; }
    .dl-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap; flex-shrink: 0; }
    .dl-btn:hover { color: var(--text); border-color: var(--muted); }

    .page { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }
    .state-msg { padding: 80px 20px; text-align: center; font-family: 'IBM Plex Mono', monospace; color: var(--muted); font-size: 13px; }
    .state-msg a { color: var(--accent); text-decoration: none; }

    .route-hero { margin-bottom: 28px; }
    .route-title { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
    .route-subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }

    .metrics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .metric-card.accent { border-color: var(--route-color, var(--accent)); }
    .metric-val { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; white-space: nowrap; }
    .metric-unit { font-size: 13px; color: var(--muted); font-weight: 400; }
    .metric-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }

    .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    #routeMap { height: 460px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 28px; overflow: hidden; }

    .profile-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 28px; }
    .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .profile-title { font-size: 14px; font-weight: 500; }
    .profile-stats { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
    .profile-wrap { position: relative; }
    .profile-canvas { width: 100%; height: 160px; display: block; cursor: crosshair; }
    .profile-tooltip {
      position: absolute; pointer-events: none;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text);
      display: none; white-space: nowrap; z-index: 10;
    }

    .details-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 28px; }
    .details-card table { width: 100%; border-collapse: collapse; }
    .details-card tr { border-bottom: 1px solid var(--border); }
    .details-card tr:last-child { border-bottom: none; }
    .details-card td { padding: 12px 16px; font-size: 13px; }
    .details-card td:first-child { color: var(--muted); width: 40%; }
    .details-card td:last-child { font-family: 'IBM Plex Mono', monospace; font-weight: 500; }

    .leaflet-container { background: #e8e0d8 !important; }

    @media (max-width: 700px) {
      .route-title { font-size: 20px; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      #routeMap { height: 300px; }
      .profile-stats { gap: 8px; font-size: 11px; }
    }
  </style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">← Back</a>
  <span class="header-title" id="headerTitle"></span>
  <span class="header-type" id="headerType"></span>
  <button class="dl-btn" id="dlGpxBtn" style="display:none">↓ GPX</button>
</header>

<div id="stateMsg" class="state-msg">Loading…</div>

<div id="pageContent" style="display:none">
  <div class="page">
    <div class="route-hero">
      <div class="route-title" id="routeTitle"></div>
      <div class="route-subtitle" id="routeSubtitle"></div>
    </div>

    <div class="metrics-grid" id="metricsGrid"></div>

    <div class="section-label">Route Map</div>
    <div id="routeMap"></div>

    <div class="profile-container" id="elevSection" style="display:none">
      <div class="profile-header">
        <div class="profile-title">Elevation Profile</div>
        <div class="profile-stats" id="elevStats"></div>
      </div>
      <div class="profile-wrap">
        <canvas class="profile-canvas" id="elevCanvas"></canvas>
        <div class="profile-tooltip" id="elevTooltip"></div>
      </div>
    </div>

    <div class="profile-container" id="speedSection" style="display:none">
      <div class="profile-header">
        <div class="profile-title">Speed Profile</div>
        <div class="profile-stats" id="speedStats"></div>
      </div>
      <div class="profile-wrap">
        <canvas class="profile-canvas" id="speedCanvas"></canvas>
        <div class="profile-tooltip" id="speedTooltip"></div>
      </div>
    </div>

    <div class="section-label">Details</div>
    <div class="details-card"><table id="detailsTable"></table></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/gpx-parser.js"></script>
<script src="js/store.js"></script>
<script>
const ACTIVITY_COLORS = { bike:'#e07840', hike:'#52c97a', kayak:'#4a9eff', run:'#f5c842', other:'#b48aff' };
const ACTIVITY_EMOJI  = { bike:'🚴', hike:'🥾', kayak:'🛶', run:'🏃', other:'✦' };

function fmt(n, dec=1) { return n == null ? '—' : Number(n).toFixed(dec); }
function fmtTime(secs) {
  if (!secs) return '—';
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
function fmtSpeed(km, secs) { return (!km||!secs) ? '—' : fmt(km/(secs/3600))+' km/h'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showError(msg) { document.getElementById('stateMsg').innerHTML = msg; }

function haversine(lat1,lon1,lat2,lon2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ── Build cumulative distance index for map points ────────────────────────────
// Returns [{lat,lon,distM}] with cumulative distance at each point
function buildDistIndex(points) {
  let d = 0;
  return points.map((p, i) => {
    if (i > 0) d += haversine(points[i-1].lat, points[i-1].lon, p.lat, p.lon);
    return { lat: p.lat, lon: p.lon, distM: d };
  });
}

// Find the point in distIndex closest to targetDistM
function seekPoint(distIndex, targetDistM) {
  let lo = 0, hi = distIndex.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (distIndex[mid].distM < targetDistM) lo = mid + 1;
    else hi = mid;
  }
  // Compare lo and lo-1
  if (lo > 0 && Math.abs(distIndex[lo-1].distM - targetDistM) < Math.abs(distIndex[lo].distM - targetDistM))
    return distIndex[lo-1];
  return distIndex[lo];
}

// ── Speed profile ─────────────────────────────────────────────────────────────
function buildSpeedProfile(points, maxSamples=500) {
  const timed = points.filter(p => p.time);
  if (timed.length < 2) return [];
  let distM = 0;
  const raw = [];
  for (let i = 1; i < timed.length; i++) {
    const prev = timed[i-1], cur = timed[i];
    const d = haversine(prev.lat,prev.lon,cur.lat,cur.lon);
    const dt = (cur.time - prev.time) / 1000;
    distM += d;
    if (dt <= 0) continue;
    raw.push({ d: distM, speed: Math.min((d/dt)*3.6, 120) });
  }
  if (raw.length === 0) return [];
  const W = 5;
  const smoothed = raw.map((pt,i) => {
    const slice = raw.slice(Math.max(0,i-W), Math.min(raw.length,i+W+1));
    return { d: Math.round(pt.d), speed: Math.round(slice.reduce((s,p)=>s+p.speed,0)/slice.length*10)/10 };
  });
  const step = Math.max(1, Math.floor(smoothed.length/maxSamples));
  return smoothed.filter((_,i) => i%step===0);
}

// ── Shared seek state ─────────────────────────────────────────────────────────
// Each chart registers itself; calling globalSeek(distM, source) updates all others
const seekers = [];  // { id, fn }
let mapMarker = null;
let distIndex = null;
let routeMap  = null;

function globalSeek(distM, sourceId) {
  // Move map marker
  if (distIndex && routeMap) {
    const pt = seekPoint(distIndex, distM);
    if (!mapMarker) {
      mapMarker = L.circleMarker([pt.lat, pt.lon], {
        radius: 7, color: '#fff', weight: 2,
        fillColor: window._routeColor, fillOpacity: 1,
      }).addTo(routeMap);
    } else {
      mapMarker.setLatLng([pt.lat, pt.lon]);
    }
  }
  // Sync other charts
  seekers.forEach(s => { if (s.id !== sourceId) s.fn(distM); });
}

function clearSeek() {
  if (mapMarker) { mapMarker.setLatLng([-9999, -9999]); }
  seekers.forEach(s => s.fn(null));
}

// ── Chart factory — returns a seek function ───────────────────────────────────
function makeChart({ canvasId, tooltipId, data, color, yUnit, statsEl, statsHtml }) {
  const canvas  = document.getElementById(canvasId);
  const tooltip = document.getElementById(tooltipId);
  if (!canvas || data.length < 2) return null;
  if (statsEl && statsHtml) statsEl.innerHTML = statsHtml;

  const minY = Math.min(...data.map(p=>p.y));
  const maxY = Math.max(...data.map(p=>p.y));
  const maxD = data[data.length-1].d;
  const PAD  = { l:48, r:10, t:10, b:28 };

  let currentX = null; // canvas x of active crosshair (null = hidden)

  function dims() {
    return { W: canvas.offsetWidth, H: canvas.offsetHeight,
             gW: canvas.offsetWidth - PAD.l - PAD.r,
             gH: canvas.offsetHeight - PAD.t - PAD.b };
  }
  function xOf(d, gW) { return PAD.l + (d/maxD)*gW; }
  function yOf(y, gH) { const r=(maxY-minY)||1; return PAD.t+gH-((y-minY)/r)*gH; }

  function draw(crosshairX) {
    const { W, H, gW, gH } = dims();
    canvas.width  = W * devicePixelRatio;
    canvas.height = H * devicePixelRatio;
    const ctx = canvas.getContext('2d');
    ctx.scale(devicePixelRatio, devicePixelRatio);

    const yRange = (maxY-minY)||1;
    // Grid
    ctx.strokeStyle='#2a3048'; ctx.lineWidth=1;
    for (let i=0; i<=4; i++) {
      const y=minY+yRange*i/4, yp=yOf(y,gH);
      ctx.beginPath(); ctx.moveTo(PAD.l,yp); ctx.lineTo(PAD.l+gW,yp); ctx.stroke();
      ctx.fillStyle='#7a849e'; ctx.font='10px IBM Plex Mono';
      ctx.fillText(Math.round(y)+yUnit, 2, yp+4);
    }
    // Area
    const grad=ctx.createLinearGradient(0,PAD.t,0,PAD.t+gH);
    grad.addColorStop(0,color+'55'); grad.addColorStop(1,color+'05');
    ctx.beginPath();
    ctx.moveTo(xOf(data[0].d,gW),yOf(data[0].y,gH));
    data.forEach(p=>ctx.lineTo(xOf(p.d,gW),yOf(p.y,gH)));
    ctx.lineTo(xOf(maxD,gW),PAD.t+gH); ctx.lineTo(PAD.l,PAD.t+gH);
    ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
    // Line
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin='round';
    data.forEach((p,i)=>i===0?ctx.moveTo(xOf(p.d,gW),yOf(p.y,gH)):ctx.lineTo(xOf(p.d,gW),yOf(p.y,gH)));
    ctx.stroke();
    // X labels
    const xTicks=Math.min(6,Math.floor(gW/80));
    ctx.fillStyle='#7a849e'; ctx.font='10px IBM Plex Mono';
    for (let i=0; i<=xTicks; i++) {
      const d=maxD*i/xTicks;
      ctx.fillText((d/1000).toFixed(1)+'km', xOf(d,gW)-14, H-6);
    }
    // Crosshair
    if (crosshairX !== null) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(crosshairX,PAD.t); ctx.lineTo(crosshairX,PAD.t+gH); ctx.stroke();
      ctx.setLineDash([]);
      // Dot on line
      const dAt = ((crosshairX-PAD.l)/gW)*maxD;
      let best=data[0];
      for (const p of data) if (Math.abs(p.d-dAt)<Math.abs(best.d-dAt)) best=p;
      ctx.beginPath();
      ctx.arc(crosshairX, yOf(best.y,gH), 4, 0, Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill();
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
    }
  }

  // Seek function: called by globalSeek with distM (or null to clear)
  function seekFn(distM) {
    const { gW } = dims();
    if (distM === null) {
      currentX = null;
      draw(null);
      tooltip.style.display = 'none';
      return;
    }
    currentX = xOf(distM, gW);
    draw(currentX);
    // Update tooltip
    let best = data[0];
    for (const p of data) if (Math.abs(p.d-distM) < Math.abs(best.d-distM)) best=p;
    tooltip.style.display = 'block';
    const clampedX = Math.min(Math.max(currentX+10, PAD.l), canvas.offsetWidth-120);
    tooltip.style.left = clampedX+'px';
    tooltip.style.top  = '8px';
    tooltip.textContent = `${(best.d/1000).toFixed(2)} km · ${best.y} ${yUnit}`;
  }

  draw(null);
  window.addEventListener('resize', () => draw(currentX));

  // Mouse events on this canvas
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const xRel = e.clientX - rect.left;
    const { gW } = dims();
    if (xRel < PAD.l || xRel > PAD.l+gW) { clearSeek(); return; }
    const distM = ((xRel-PAD.l)/gW)*maxD;
    currentX = xRel;
    draw(currentX);
    // Show own tooltip
    let best=data[0];
    for (const p of data) if (Math.abs(p.d-distM)<Math.abs(best.d-distM)) best=p;
    tooltip.style.display='block';
    const clampedX = Math.min(xRel+10, canvas.offsetWidth-120);
    tooltip.style.left=clampedX+'px';
    tooltip.style.top='8px';
    tooltip.textContent=`${(best.d/1000).toFixed(2)} km · ${best.y} ${yUnit}`;
    globalSeek(distM, canvasId);
  });
  canvas.addEventListener('mouseleave', () => clearSeek());

  return seekFn;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(async () => {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { showError('No route ID. <a href="index.html">← Back</a>'); return; }
  const index = await Store.loadIndex();
  const route = index.find(r => r.id === id);
  if (!route) { showError('Route not found. <a href="index.html">← Back</a>'); return; }

  let points = [];
  try {
    const gpxText = await Store.loadGPX(id);
    const parsed = GPXParser.parse(gpxText, route.name);
    points = parsed.points;
    const dlBtn = document.getElementById('dlGpxBtn');
    dlBtn.style.display = '';
    dlBtn.onclick = () => {
      const blob = new Blob([gpxText],{type:'application/gpx+xml'});
      const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`${id}.gpx`});
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    };
  } catch(e) { console.warn('GPX load failed:',e.message); }

  renderPage(route, points);
})();

// ── Render ────────────────────────────────────────────────────────────────────
function renderPage(route, points) {
  document.getElementById('stateMsg').style.display = 'none';
  document.getElementById('pageContent').style.display = '';

  const m = route.metrics;
  const color = ACTIVITY_COLORS[route.type] || ACTIVITY_COLORS.other;
  window._routeColor = color;
  document.documentElement.style.setProperty('--route-color', color);
  document.title = route.name + ' — Adventure Log';
  document.getElementById('headerTitle').textContent = route.name;
  const typeEl = document.getElementById('headerType');
  typeEl.textContent = ACTIVITY_EMOJI[route.type]+' '+route.type;
  typeEl.style.background = color+'22'; typeEl.style.color = color;
  document.getElementById('routeTitle').textContent = route.name;
  const dateStr = m?.startTime ? fmtDate(m.startTime) : '';
  const ptStr = m?.pointCount ? m.pointCount.toLocaleString()+' GPS points' : '';
  document.getElementById('routeSubtitle').textContent = [dateStr,ptStr].filter(Boolean).join(' · ');

  // ── Cards ──────────────────────────────────────────────────────────────────
  const cards = [
    { val:fmt(m?.distanceKm),                                       unit:'km',  lbl:'Distance',   accent:true },
    { val:fmtTime(m?.movingTime),                                    unit:'',    lbl:'Moving Time'             },
    { val:fmtSpeed(m?.distanceKm, m?.movingTime),                    unit:'',    lbl:'Avg Speed'               },
    { val:m?.elevGain!=null?m.elevGain.toLocaleString():'—',        unit:'m',   lbl:'Ascent'                  },
    { val:m?.elevLoss!=null?m.elevLoss.toLocaleString():'—',        unit:'m',   lbl:'Descent'                 },
  ];
  const grid = document.getElementById('metricsGrid');
  cards.forEach(c => {
    const card = document.createElement('div');
    card.className = 'metric-card'+(c.accent?' accent':'');
    card.innerHTML = `<div class="metric-val">${c.val}<span class="metric-unit">${c.unit?' '+c.unit:''}</span></div><div class="metric-lbl">${c.lbl}</div>`;
    grid.appendChild(card);
  });

  // ── Map ────────────────────────────────────────────────────────────────────
  routeMap = L.map('routeMap',{zoomControl:true});
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom:19,
  }).addTo(routeMap);

  const mapPoints = points.length >= 2 ? points : (m?.simplifiedPath||[]);
  if (mapPoints.length >= 2) {
    distIndex = buildDistIndex(mapPoints);
    const totalDistM = distIndex[distIndex.length-1].distM;
    const latlngs = mapPoints.map(p=>[p.lat,p.lon]);
    const pl = L.polyline(latlngs,{color,weight:4,opacity:0.9}).addTo(routeMap);
    routeMap.fitBounds(pl.getBounds(),{padding:[30,30]});
    setTimeout(()=>routeMap.invalidateSize(),200);

    // Start/end markers
    const mkIcon=(fill,border)=>L.divIcon({
      className:'',
      html:`<div style="width:12px;height:12px;background:${fill};border:2px solid ${border};border-radius:50%;box-shadow:0 0 6px ${fill}88"></div>`,
      iconSize:[12,12],iconAnchor:[6,6],
    });
    L.marker(latlngs[0],{icon:mkIcon(color,'#fff')}).addTo(routeMap).bindTooltip('Start');
    L.marker(latlngs[latlngs.length-1],{icon:mkIcon('#fff',color)}).addTo(routeMap).bindTooltip('End');

    // Hover on polyline → seek charts
    pl.on('mousemove', e => {
      // Find closest point by lat/lon
      let bestDist = Infinity, bestIdx = 0;
      distIndex.forEach((pt,i) => {
        const d = haversine(e.latlng.lat,e.latlng.lng,pt.lat,pt.lon);
        if (d < bestDist) { bestDist=d; bestIdx=i; }
      });
      globalSeek(distIndex[bestIdx].distM, 'map');
    });
    pl.on('mouseout', () => clearSeek());
  } else {
    document.getElementById('routeMap').innerHTML =
      '<div style="height:460px;display:flex;align-items:center;justify-content:center;color:#7a849e;font-family:IBM Plex Mono,monospace">No GPS points to display</div>';
  }

  // ── Elevation chart ────────────────────────────────────────────────────────
  const elevProfile = m?.elevProfile;
  if (elevProfile && elevProfile.length > 2) {
    document.getElementById('elevSection').style.display = 'block';
    const minE = Math.min(...elevProfile.map(p=>p.ele));
    const maxE = Math.max(...elevProfile.map(p=>p.ele));
    const fn = makeChart({
      canvasId:'elevCanvas', tooltipId:'elevTooltip',
      data: elevProfile.map(p=>({d:p.d,y:p.ele})),
      color, yUnit:'m',
      statsEl: document.getElementById('elevStats'),
      statsHtml: `<span>↑ ${m.elevGain}m ascent</span><span>↓ ${m.elevLoss}m descent</span><span>${minE}–${maxE}m range</span>`,
    });
    if (fn) seekers.push({ id:'elevCanvas', fn });
  }

  // ── Speed chart ────────────────────────────────────────────────────────────
  if (points.length >= 2) {
    const speedProfile = buildSpeedProfile(points);
    if (speedProfile.length > 2) {
      document.getElementById('speedSection').style.display = 'block';
      const speeds = speedProfile.map(p=>p.speed);
      const avgSpd = Math.round(speeds.reduce((a,b)=>a+b,0)/speeds.length*10)/10;
      const maxSpd = Math.max(...speeds).toFixed(1);
      const fn = makeChart({
        canvasId:'speedCanvas', tooltipId:'speedTooltip',
        data: speedProfile.map(p=>({d:p.d,y:p.speed})),
        color, yUnit:'km/h',
        statsEl: document.getElementById('speedStats'),
        statsHtml: `<span>avg ${avgSpd} km/h</span><span>max ${maxSpd} km/h</span>`,
      });
      if (fn) seekers.push({ id:'speedCanvas', fn });
    }
  }

  // ── Details table ──────────────────────────────────────────────────────────
  const rows=[
    ['Date',          fmtDate(m?.startTime)],
    ['Activity',      ACTIVITY_EMOJI[route.type]+' '+route.type],
    ['Distance',      fmt(m?.distanceKm)+' km'],
    ['Moving Time',   fmtTime(m?.movingTime)],
    ['Total Time',    fmtTime(m?.totalTime)],
    ['Average Speed', fmtSpeed(m?.distanceKm,m?.movingTime)],
    ['Ascent',        m?.elevGain!=null?m.elevGain.toLocaleString()+' m':'—'],
    ['Descent',       m?.elevLoss!=null?m.elevLoss.toLocaleString()+' m':'—'],
    ['Max Elevation', m?.maxEle!=null?m.maxEle.toLocaleString()+' m':'—'],
    ['Min Elevation', m?.minEle!=null?m.minEle.toLocaleString()+' m':'—'],
    ['Avg Heart Rate',m?.avgHr?m.avgHr+' bpm':'—'],
    ['GPS Points',    m?.pointCount?m.pointCount.toLocaleString():'—'],
    ['GPX File',      `data/gpx/${route.id}.gpx`],
  ];
  const table = document.getElementById('detailsTable');
  rows.forEach(([lbl,val])=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(lbl)}</td><td>${esc(String(val))}</td>`;
    table.appendChild(tr);
  });
}
</script>
</body>
</html>
